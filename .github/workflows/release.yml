name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun run build

      - name: Test
        run: bun run test

      - name: Check for changesets
        id: check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1 && [ "$(ls .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version bump
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          # Determine bump type from changeset files
          BUMP="patch"
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            if grep -q "major" "$f"; then BUMP="major"; break; fi
            if grep -q "minor" "$f"; then BUMP="minor"; fi
          done

          # Bump version in package.json
          npm version "$BUMP" --no-git-tag-version

          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +%Y-%m-%d)

          # Collect changelog entries
          ENTRIES=""
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            ENTRIES="$ENTRIES$(awk '/^---$/{c++;next} c==2' "$f" | sed '/^$/d')\n"
          done

          # Prepend to CHANGELOG.md
          {
            echo "# stanok"
            echo ""
            echo "## $VERSION — $DATE"
            echo ""
            echo -e "$ENTRIES"
            if [ -f CHANGELOG.md ]; then
              # Skip old "# stanok" header if present
              tail -n +2 CHANGELOG.md
            fi
          } > CHANGELOG.new.md
          mv CHANGELOG.new.md CHANGELOG.md

          # Remove consumed changeset files (keep README.md)
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            rm "$f"
          done

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release stanok@$VERSION"
          git tag "v$VERSION"
          git push && git push --tags

      - name: Publish to npm
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          bun run clean && bun run build
          npm publish --provenance --access public

      - name: Publish unpublished version
        if: steps.check.outputs.has_changesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "stanok@$VERSION" version 2>/dev/null; then
            echo "stanok@$VERSION already published, skipping"
          else
            echo "stanok@$VERSION not on npm, publishing..."
            bun run clean && bun run build
            npm publish --provenance --access public
          fi
