name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun run build

      - name: Test
        id: tests
        run: |
          output=$(bun run test 2>&1)
          echo "$output"
          total=$(echo "$output" | grep -oP 'Ran \K[0-9]+' | paste -sd+ | bc)
          echo "count=$total" >> "$GITHUB_OUTPUT"

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: stanok-tests.json
          label: tests
          message: "${{ steps.tests.outputs.count }} passing"
          color: brightgreen
